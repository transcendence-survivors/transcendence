version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - client
      - server
      - game

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./apps/server
    environment:
      NODE_ENV: production
      NEST_PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
      JWT_SECRET: prod_secret

  client:
    build: ./apps/client
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api

  game:
    build: ./apps/game
    environment:
      NODE_ENV: production
      VITE_API_URL: /api

volumes:
  postgres_data:
